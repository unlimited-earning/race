<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Highway - Login & Register (Firebase)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #03030c;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Cyberpunk Grid Background */
        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 200, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 200, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center;
            z-index: 1;
        }
        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 0, 85, 0.15) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            z-index: 1;
            pointer-events: none;
        }
        .bg-glow-right {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 255, 200, 0.1) 0%, transparent 70%);
            bottom: -150px;
            right: -150px;
            z-index: 1;
            pointer-events: none;
        }

        /* Main Container Card */
        .auth-card {
            width: 90%;
            max-width: 420px;
            background: rgba(10, 10, 25, 0.9);
            border: 2px solid rgba(0, 255, 200, 0.3);
            border-radius: 16px;
            padding: 35px 30px;
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.15);
            z-index: 5;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .brand-header h1 {
            color: #00ffcc;
            font-size: 28px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 200, 0.5);
            text-transform: uppercase;
        }
        .brand-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            margin-top: 5px;
        }

        /* Form Tab Switchers */
        .tab-group {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 0;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        .tab-btn.active {
            background: rgba(0, 255, 200, 0.2);
            color: #00ffcc;
            text-shadow: 0 0 5px rgba(0, 255, 200, 0.5);
        }

        /* Form Fields */
        .form-section {
            display: none;
        }
        .form-section.active {
            display: block;
        }
        .input-group {
            margin-bottom: 18px;
            position: relative;
        }
        .input-group label {
            display: block;
            color: rgba(255, 255, 255, 0.75);
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .input-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 12px 15px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        .input-group input:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 200, 0.25);
            background: rgba(0, 255, 200, 0.02);
        }

        /* Actions */
        .submit-btn {
            width: 100%;
            background: linear-gradient(45deg, #ff0055, #ff5500);
            border: none;
            color: white;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.3);
            transition: 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(255, 0, 85, 0.5);
        }

        /* Error/Success Feedbacks */
        .msg-box {
            font-size: 13px;
            text-align: center;
            margin-top: 15px;
            min-height: 18px;
            font-weight: bold;
        }
        .msg-error {
            color: #ff0055;
            text-shadow: 0 0 5px rgba(255, 0, 85, 0.3);
        }
        .msg-success {
            color: #00ffcc;
            text-shadow: 0 0 5px rgba(0, 255, 200, 0.3);
        }
    </style>

    <!-- ফায়ারবেস স্ক্রিপ্ট লাইব্রেরিস (v8 Compatibility SDKs) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="bg-glow-right"></div>

    <div class="auth-card">
        <div class="brand-header">
            <h1>NEON HIGHWAY</h1>
            <p>Enter the Cyber Championship</p>
        </div>

        <div class="tab-group">
            <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">LOGIN</button>
            <button class="tab-btn" id="tab-register" onclick="switchTab('register')">REGISTER</button>
        </div>

        <!-- Login Form Section -->
        <div class="form-section active" id="sect-login">
            <form id="form-login-el" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="login-email">EMAIL ADDRESS</label>
                    <input type="email" id="login-email" placeholder="driver@cyber.com" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="login-pass">PASSWORD</label>
                    <input type="password" id="login-pass" placeholder="••••••••" required autocomplete="off">
                </div>
                <button type="submit" class="submit-btn" id="btn-login-submit">Enter Game</button>
            </form>
        </div>

        <!-- Register Form Section -->
        <div class="form-section" id="sect-register">
            <form id="form-register-el" onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label for="reg-username">USERNAME</label>
                    <input type="text" id="reg-username" placeholder="Create username" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="reg-email">EMAIL ADDRESS</label>
                    <input type="email" id="reg-email" placeholder="example@cyber.com" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="reg-pass">PASSWORD</label>
                    <input type="password" id="reg-pass" placeholder="Minimum 6 characters" required autocomplete="off">
                </div>
                <button type="submit" class="submit-btn" id="btn-register-submit">Generate Driver License</button>
            </form>
        </div>

        <div class="msg-box" id="feedback-msg"></div>
    </div>

    <script>
        // --- ফায়ারবেস কনফিগারেশন এবং ইনিশিয়ালাইজেশন ---
        const firebaseConfig = {
            apiKey: "AIzaSyBFKWIm1kUaP47rsHtEEP05G66-SSRsvwA",
            authDomain: "gamil-sever.firebaseapp.com",
            databaseURL: "https://gamil-sever-default-rtdb.firebaseio.com",
            projectId: "gamil-sever",
            storageBucket: "gamil-sever.firebasestorage.app",
            messagingSenderId: "895391304528",
            appId: "1:895391304528:web:4b86c59ce3163607beba55"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // --- Form Tab Switcher ---
        function switchTab(type) {
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');
            const sectLogin = document.getElementById('sect-login');
            const sectRegister = document.getElementById('sect-register');
            const feedback = document.getElementById('feedback-msg');

            feedback.innerText = ""; 

            if (type === 'login') {
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
                sectLogin.classList.add('active');
                sectRegister.classList.remove('active');
            } else {
                tabRegister.classList.add('active');
                tabLogin.classList.remove('active');
                sectRegister.classList.add('active');
                sectLogin.classList.remove('active');
            }
        }

        // --- Unique User ID Generator (USR-XXXXXX) ---
        function generateUniqueUID() {
            return 'USR-' + Math.floor(100000 + Math.random() * 900000);
        }

        // --- User Registration with Firebase ---
        function handleRegister(event) {
            event.preventDefault();
            
            const username = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-pass').value;
            const btnSubmit = document.getElementById('btn-register-submit');

            if (password.length < 6) {
                showFeedback("Password must be at least 6 characters long.", "error");
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.innerText = "Creating Account...";

            // ফায়ারবেস অথেন্টিকেশন দ্বারা অ্যাকাউন্ট তৈরি
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    const driverUid = generateUniqueUID();

                    // রিয়েল-টাইম ডাটাবেসে ইউজার প্রোফাইল এন্ট্রি
                    const userData = {
                        uid: driverUid,
                        username: username,
                        email: email,
                        stats: {
                            wins: 0,
                            losses: 0,
                            copiedSkill: ""
                        }
                    };

                    // ফায়ারবেস রিয়েল-টাইম ডাটাবেসে রাইট (Write)
                    database.ref('users/' + user.uid).set(userData)
                        .then(() => {
                            // ম্যাচ মেকিংয়ের জন্য ইউআইডি লুকআপ টেবিলে এন্ট্রি
                            return database.ref('uid_lookup/' + driverUid).set(user.uid);
                        })
                        .then(() => {
                            showFeedback(`Registration Success! UID: ${driverUid}`, "success");
                            document.getElementById('form-register-el').reset();
                            btnSubmit.disabled = false;
                            btnSubmit.innerText = "Generate Driver License";
                            
                            setTimeout(() => {
                                switchTab('login');
                                document.getElementById('login-email').value = email;
                            }, 1800);
                        });
                })
                .catch((error) => {
                    showFeedback(error.message, "error");
                    btnSubmit.disabled = false;
                    btnSubmit.innerText = "Generate Driver License";
                });
        }

        // --- User Login with Firebase ---
        function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value;
            const btnSubmit = document.getElementById('btn-login-submit');

            btnSubmit.disabled = true;
            btnSubmit.innerText = "Verifying Identity...";

            // ফায়ারবেস অথেন্টিকেশন লগইন
            auth.signInWithEmailAndPassword(email, pass)
                .then((userCredential) => {
                    const user = userCredential.user;

                    // ডাটাবেস থেকে ইউজারের ডাটা নিয়ে আসা
                    database.ref('users/' + user.uid).once('value')
                        .then((snapshot) => {
                            const userData = snapshot.val();
                            
                            // ব্রাউজার সেশনে ডাটা সেভ
                            localStorage.setItem('current_user', JSON.stringify({
                                firebaseUid: user.uid,
                                uid: userData.uid,
                                username: userData.username,
                                stats: userData.stats || { wins: 0, losses: 0 }
                            }));

                            showFeedback("Identity Verified! Entering Cyberport...", "success");
                            btnSubmit.disabled = false;
                            btnSubmit.innerText = "Enter Game";

                            setTimeout(() => {
                                window.location.href = "home.html";
                            }, 1200);
                        });
                })
                .catch((error) => {
                    showFeedback(error.message, "error");
                    btnSubmit.disabled = false;
                    btnSubmit.innerText = "Enter Game";
                });
        }

        function showFeedback(text, type) {
            const feedback = document.getElementById('feedback-msg');
            feedback.innerText = text;
            if (type === "error") {
                feedback.className = "msg-box msg-error";
            } else {
                feedback.className = "msg-box msg-success";
            }
        }

        // সাইন-ইন সেশন রিস্টোর চেক
        window.addEventListener('DOMContentLoaded', () => {
            const session = localStorage.getItem('current_user');
            if (session) {
                window.location.href = "home.html";
            }
        });
    </script>
</body>
</html>
